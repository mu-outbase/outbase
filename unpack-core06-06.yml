name: OUTBASE Core06.06 Mobile Shell Polish unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core06_06_MobileShellPolish.zip'
      - '.github/workflows/unpack-core06-06.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core06_06_MobileShellPolish.zip

      - name: Unzip Core06.06 package
        run: |
          set -e
          rm -rf /tmp/outbase_core06_06
          mkdir -p /tmp/outbase_core06_06
          unzip -o OUTBASE_MVPB_Core06_06_MobileShellPolish.zip -d /tmp/outbase_core06_06
          ls -la /tmp/outbase_core06_06
          if [ -d /tmp/outbase_core06_06/OUTBASE_MVPB_Core06_06_MobileShellPolish ]; then
            cp -R /tmp/outbase_core06_06/OUTBASE_MVPB_Core06_06_MobileShellPolish/. ./
          else
            cp -R /tmp/outbase_core06_06/. ./
          fi
          rm -f OUTBASE_MVPB_Core06_06_MobileShellPolish.zip
          rm -rf OUTBASE_MVPB_Core06_02_RecordModeMapConfirm OUTBASE_MVPB_Core06_03_RecordUXPolish OUTBASE_MVPB_Core06_04_RecordFieldUX OUTBASE_MVPB_Core06_05_AllPagesVisualUnify

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core06.06 mobile shell polish"
            git push
          fi
