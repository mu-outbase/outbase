<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OUTBASE</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f2f2f2;
}

header{
    background:#2f6f3a;
    color:white;
    text-align:center;
    padding:20px;
    font-size:32px;
    font-weight:bold;
}

.page{
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
    margin-top:0;
}

button{
    width:100%;
    padding:18px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#2f6f3a;
    color:white;
    font-size:20px;
}

.hidden{
    display:none;
}

.timer{
    font-size:48px;
    font-weight:bold;
    text-align:center;
    margin:30px 0;
}

.record{
    padding:10px 0;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<header>OUTBASE</header>

<div id="home" class="page">

    <div class="card">

        <h1>今日の記録</h1>

        <button onclick="startWalk()">
            散歩開始
        </button>

        <button onclick="alert('準備中')">
            キャンプ開始
        </button>

        <button onclick="alert('準備中')">
            記録追加
        </button>

    </div>

    <div class="card">

        <h1>最近の記録</h1>

        <div id="records">
            記録なし
        </div>

    </div>

</div>

<div id="walk" class="page hidden">

    <div class="card">

        <h1>散歩中</h1>

        <div id="timer" class="timer">
            00:00:00
        </div>

        <button onclick="alert('次回実装')">
            写真追加
        </button>

        <button onclick="alert('次回実装')">
            音声メモ
        </button>

        <button onclick="finishWalk()">
            散歩終了
        </button>

    </div>

</div>

<script>

let seconds = 0;
let interval;

if(!localStorage.getItem("outbase_records")){
    localStorage.setItem(
        "outbase_records",
        JSON.stringify([])
    );
}

function startWalk(){

    document.getElementById("home")
        .classList.add("hidden");

    document.getElementById("walk")
        .classList.remove("hidden");

    seconds = 0;

    interval = setInterval(function(){

        seconds++;

        let h=Math.floor(seconds/3600);
        let m=Math.floor((seconds%3600)/60);
        let s=seconds%60;

        document.getElementById("timer").innerHTML=
            String(h).padStart(2,"0")
            + ":"
            + String(m).padStart(2,"0")
            + ":"
            + String(s).padStart(2,"0");

    },1000);

}

function finishWalk(){

    clearInterval(interval);

    let records =
        JSON.parse(
            localStorage.getItem("outbase_records")
        );

    records.unshift({

        date:new Date().toLocaleString(),

        time:document
            .getElementById("timer")
            .innerHTML

    });

    localStorage.setItem(
        "outbase_records",
        JSON.stringify(records)
    );

    alert(
        "散歩終了\n記録時間 : "
        + document.getElementById("timer").innerHTML
    );

    location.reload();

}

window.onload=function(){

    let records =
        JSON.parse(
            localStorage.getItem("outbase_records")
        );

    let html="";

    records.forEach(function(r){

        html += `
        <div class="record">
            ${r.date}<br>
            散歩時間 : ${r.time}
        </div>
        `;

    });

    if(records.length===0){
        html="記録なし";
    }

    document.getElementById("records")
        .innerHTML=html;

}

</script>

</body>
</html>
