<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OUTBASE</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f2f2f2;
}

header{
background:#2f6f3a;
color:white;
text-align:center;
padding:20px;
font-size:32px;
font-weight:bold;
}

.page{
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:25px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

button{
width:100%;
padding:18px;
margin:10px 0;
border:none;
border-radius:10px;
background:#2f6f3a;
color:white;
font-size:20px;
}

.hidden{
display:none;
}

.timer{
font-size:48px;
font-weight:bold;
text-align:center;
margin:30px 0;
}

.record{
background:#ffffff;
border-radius:16px;
padding:18px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
line-height:1.7;
}

.record-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.record-row{
margin:10px 0;
font-size:17px;
}

.photoInfo,
.gpsInfo{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<header>OUTBASE</header>

<div id="home" class="page">

<div class="card">

<h1>今日の記録</h1>

<button onclick="startWalk()">
散歩開始
</button>

<button onclick="alert('準備中')">
キャンプ開始
</button>

<button onclick="alert('準備中')">
記録追加
</button>

</div>

<div class="card">

<h1>最近の記録</h1>

<div id="records">
記録なし
</div>

</div>

</div>

<div id="walk" class="page hidden">

<div class="card">

<h1>散歩中</h1>

<div id="timer" class="timer">
00:00:00
</div>

<div id="gpsInfo" class="gpsInfo">
GPS取得中...
</div>

<input
type="file"
id="photoInput"
accept="image/*"
multiple
style="display:none"
onchange="addPhoto()">

<button onclick="document.getElementById('photoInput').click()">
写真追加
</button>

<div id="photoInfo" class="photoInfo">
写真 0枚
</div>

<button onclick="alert('次回実装')">
音声メモ
</button>

<button onclick="finishWalk()">
散歩終了
</button>

</div>

</div>

<script>

let seconds = 0;
let interval;
let photos = [];
let startGps = "未取得";
let endGps = "未取得";
let distanceKm = "未取得";

if(!localStorage.getItem("outbase_records")){
localStorage.setItem(
"outbase_records",
JSON.stringify([])
);
}

function startWalk(){

document.getElementById("home")
.classList.add("hidden");

document.getElementById("walk")
.classList.remove("hidden");

seconds = 0;
photos = [];
startGps = "取得中";
endGps = "未取得";
distanceKm = "未取得";

document.getElementById("gpsInfo").innerHTML =
"開始GPS取得中...";

getGps(function(gps){

startGps = gps;

document.getElementById("gpsInfo").innerHTML =
"開始GPS : " + gps;

});

interval = setInterval(function(){

seconds++;

let h=Math.floor(seconds/3600);
let m=Math.floor((seconds%3600)/60);
let s=seconds%60;

document.getElementById("timer").innerHTML=
String(h).padStart(2,"0")
+":"
+String(m).padStart(2,"0")
+":"
+String(s).padStart(2,"0");

},1000);

}

function addPhoto(){

let files =
document.getElementById("photoInput").files;

for(let i=0;i<files.length;i++){
photos.push(files[i].name);
}

document.getElementById("photoInfo").innerHTML =
"写真 " + photos.length + "枚";

}

function getGps(callback){

if(!navigator.geolocation){
callback("未取得");
return;
}

navigator.geolocation.getCurrentPosition(
function(position){

let lat = position.coords.latitude.toFixed(6);
let lng = position.coords.longitude.toFixed(6);

callback(lat + "," + lng);

},
function(){
callback("未取得");
},
{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}
);

}

function calcDistance(gps1,gps2){

if(gps1==="未取得" || gps2==="未取得" || gps1==="取得中"){
return "未取得";
}

let p1 = gps1.split(",");
let p2 = gps2.split(",");

let lat1 = Number(p1[0]);
let lon1 = Number(p1[1]);
let lat2 = Number(p2[0]);
let lon2 = Number(p2[1]);

let R = 6371;
let dLat = (lat2-lat1) * Math.PI / 180;
let dLon = (lon2-lon1) * Math.PI / 180;

let a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1 * Math.PI / 180) *
Math.cos(lat2 * Math.PI / 180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return (R * c).toFixed(2) + "km";

}

function finishWalk(){

clearInterval(interval);

document.getElementById("gpsInfo").innerHTML =
"終了GPS取得中...";

getGps(function(gps){

endGps = gps;
distanceKm = calcDistance(startGps,endGps);

let records =
JSON.parse(
localStorage.getItem("outbase_records")
);

records.unshift({

date:new Date().toLocaleString(),

time:document
.getElementById("timer")
.innerHTML,

photoCount:photos.length,

startGps:startGps,

endGps:endGps,

distanceKm:distanceKm

});

localStorage.setItem(
"outbase_records",
JSON.stringify(records)
);

alert(
"散歩終了\n記録時間 : "
+ document.getElementById("timer").innerHTML
+ "\n写真 : "
+ photos.length
+ "枚"
+ "\n移動距離 : "
+ distanceKm
);

location.reload();

});

}

window.onload=function(){

let records =
JSON.parse(
localStorage.getItem("outbase_records")
);

let html="";

records.forEach(function(r){

html += `
<div class="record">

<div class="record-title">
📅 ${r.date}
</div>

<div class="record-row">
🚶 散歩時間<br>
${r.time}
</div>

<div class="record-row">
📷 写真<br>
${r.photoCount || 0}枚
</div>

<div class="record-row">
🎤 音声<br>
0件
</div>

<div class="record-row">
📍 開始GPS<br>
${r.startGps || "未取得"}
</div>

<div class="record-row">
📍 終了GPS<br>
${r.endGps || "未取得"}
</div>

<div class="record-row">
📏 移動距離<br>
${r.distanceKm || "未取得"}
</div>

</div>
`;

});

if(records.length===0){
html="記録なし";
}

document.getElementById("records")
.innerHTML=html;

}

</script>

</body>
</html>
