<script>
(() => {
  'use strict';
  const query=new URLSearchParams(location.search);
  let stored='';
  try{stored=localStorage.getItem('outbase_record_session_state')||'';}catch(_error){}
  const state=query.get('recordState')||stored||'idle';
  const recording=['active','paused'].includes(state);
  const explicitLegacy=query.has('tab')||Boolean(location.hash);
  const shellRequested=query.get('shell')==='1';

  // Normal OUTBASE launch always enters the new HOME shell.
  // FIELD03/recording and explicit legacy URLs are protected.
  if(!recording&&!shellRequested&&!explicitLegacy){
    const next=new URL(location.href);
    next.searchParams.set('shell','1');
    next.searchParams.set('view','home');
    location.replace(next.href);
    return;
  }

  const fastShell=shellRequested&&!recording;
  globalThis.__OUTBASE_FAST_SHELL__=fastShell;
  if(fastShell)document.documentElement.classList.add('outbaseShellBoot');
})();
</script>
