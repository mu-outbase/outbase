<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b130f" />
  <title>OUTBASE</title>
  <link rel="manifest" href="manifest.json?v=outbase-clean-reference-v4" />
  <link rel="stylesheet" href="style.css?v=outbase-clean-reference-v4" />
</head>
<body>
  <div id="app"></div>
  <input id="fileInput" type="file" accept=".json,.txt,.csv,.md,.xlsx,.xls,image/*,video/*" multiple hidden />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(()=>{});
    }
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(()=>{});
    }
  </script>
  <script src="src/app.js?v=outbase-clean-reference-v4" defer></script>
</body>
</html>
