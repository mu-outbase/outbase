<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1411" />
  <title>OUTBASE</title>
  <!-- restart-37-40-clean-restore-lock: 37-40 clean restore using fixed commit 52028263e0078b73365e1012ec510bf97892c41e -->
  <link rel="manifest" href="manifest.json?v=restart-37-40-small-plan-chip-lock" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mu-outbase/outbase@52028263e0078b73365e1012ec510bf97892c41e/style.css?v=restart-37-40-clean-restore-lock" />
  <style>

    /* Restart-37-40 / v36.0 小型プランチップ統合実装LOCK */
    .global-plan-switch.small-plan-chip-shell {
      position: relative !important;
      top: auto !important;
      z-index: 12 !important;
      display: block !important;
      margin: 2px 0 10px !important;
      padding: 0 !important;
      border: 0 !important;
      border-radius: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
    }
    .global-plan-switch.small-plan-chip-shell > .global-plan-current,
    .global-plan-switch.small-plan-chip-shell > .global-plan-actions,
    .global-plan-switch.small-plan-chip-shell > .global-plan-chips {
      display: none !important;
    }
    .plan-chip-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }
    .small-plan-chip {
      max-width: 100%;
      min-height: 34px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      gap: 1px 7px;
      align-items: center;
      padding: 6px 9px;
      border: 1px solid rgba(31, 42, 36, .14);
      border-radius: 999px;
      color: var(--ink, #1f2a24);
      background: rgba(255, 250, 240, .72);
      box-shadow: 0 6px 18px rgba(31, 42, 36, .06);
      text-align: left;
      backdrop-filter: blur(12px);
    }
    .small-plan-chip:active { transform: translateY(1px); }
    .small-plan-label {
      grid-row: 1 / span 2;
      align-self: center;
      padding: 3px 6px;
      border-radius: 999px;
      color: var(--accent-2, #2f5f4a);
      background: rgba(47, 95, 74, .10);
      font-size: 10.5px;
      font-weight: 900;
      white-space: nowrap;
    }
    .small-plan-chip strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      line-height: 1.15;
      font-weight: 900;
    }
    .small-plan-chip small {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted, #66746c);
      font-size: 10.8px;
      line-height: 1.1;
      font-weight: 750;
    }
    .small-plan-chip i {
      grid-row: 1 / span 2;
      align-self: center;
      color: var(--muted, #66746c);
      font-style: normal;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .global-plan-switch.record-target-mode .small-plan-chip {
      border-color: rgba(161, 92, 47, .32);
      background: rgba(255, 247, 235, .88);
      box-shadow: 0 8px 22px rgba(161, 92, 47, .10);
    }
    .global-plan-switch.record-target-mode .small-plan-label {
      color: #8b4b2e;
      background: rgba(161, 92, 47, .12);
    }
    .plan-chip-drawer[hidden] { display: none !important; }
    .plan-chip-drawer {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 7px);
      z-index: 40;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(31, 42, 36, .14);
      border-radius: 18px;
      background: rgba(255, 250, 240, .97);
      box-shadow: 0 18px 46px rgba(31, 42, 36, .18);
      backdrop-filter: blur(18px);
    }
    .plan-chip-drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted, #66746c);
      font-size: 12px;
      font-weight: 900;
    }
    .plan-chip-close {
      min-height: 30px;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--ink, #1f2a24);
      background: rgba(31, 42, 36, .06);
      font-size: 12px;
      font-weight: 900;
    }
    .plan-chip-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }
    .plan-chip-actions button {
      min-height: 36px;
      border-radius: 999px;
      color: var(--ink, #1f2a24);
      background: rgba(31, 42, 36, .06);
      font-size: 12px;
      font-weight: 900;
    }
    .plan-chip-actions button.emphasis {
      color: #fff;
      background: linear-gradient(135deg, #1f2a24, #2f5f4a);
    }
    .plan-chip-candidates {
      display: grid;
      gap: 7px;
    }
    .plan-chip-candidates .global-plan-chip {
      width: 100%;
      min-width: 0 !important;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 4px 10px;
      padding: 9px 10px;
      border-radius: 14px;
    }
    .plan-chip-candidates .global-plan-chip b {
      max-width: 100% !important;
      font-size: 13px;
    }
    .plan-chip-candidates .global-plan-chip small { justify-self: end; }
    @media (max-width: 430px) {
      .small-plan-chip {
        width: 100%;
        min-height: 32px;
        padding: 5px 8px;
      }
      .small-plan-chip strong { font-size: 12.6px; }
      .small-plan-chip small { font-size: 10.4px; }
      .plan-chip-drawer {
        position: fixed;
        left: 12px;
        right: 12px;
        top: 86px;
        max-height: min(68vh, 520px);
        overflow: auto;
      }
      .plan-chip-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

  </style>

  <script>
    // OUTBASE clean restore: remove old local caches/service workers that may keep v144/v145 mixed UI.
    (() => {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.unregister())).catch(() => {});
        }
        if (window.caches) {
          caches.keys().then(keys => keys.forEach(key => caches.delete(key))).catch(() => {});
        }
      } catch (e) {}
    })();
  </script>

</head>
<body>
  <div id="app" class="app" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/gh/mu-outbase/outbase@52028263e0078b73365e1012ec510bf97892c41e/src/app.js?v=restart-37-40-clean-restore-lock" defer></script>
  <script>

    (() => {
      const ROOT_SELECTOR = '.global-plan-switch';
      const READY_ATTR = 'data-small-plan-chip-ready';

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function isRecordScreen() {
        return Boolean(
          document.querySelector('.capture-grid') ||
          document.querySelector('.capture-hero') ||
          document.querySelector('[data-action="pickMedia"]')
        );
      }

      function closeAllDrawers() {
        document.querySelectorAll('[data-plan-chip-drawer]').forEach((drawer) => {
          drawer.hidden = true;
          const root = drawer.closest(ROOT_SELECTOR);
          root?.querySelector('[data-plan-chip-toggle]')?.setAttribute('aria-expanded', 'false');
        });
      }

      function enhancePlanSwitch(root) {
        if (!root || root.hasAttribute(READY_ATTR)) return;

        const current = root.querySelector('.global-plan-current');
        const actions = root.querySelector('.global-plan-actions');
        const chips = root.querySelector('.global-plan-chips');

        const name = current?.querySelector('strong')?.textContent?.trim() || '現在プラン';
        const meta = current?.querySelector('span')?.textContent?.trim() || '';
        const label = isRecordScreen() ? '保存先' : '現在';

        root.classList.add('small-plan-chip-shell');
        if (isRecordScreen()) root.classList.add('record-target-mode');

        const actionHtml = actions ? actions.innerHTML : '';
        const chipHtml = chips ? chips.innerHTML : '';

        root.insertAdjacentHTML('afterbegin', `
          <div class="plan-chip-row">
            <button type="button" class="small-plan-chip" data-plan-chip-toggle aria-expanded="false">
              <span class="small-plan-label">${escapeHtml(label)}</span>
              <strong>${escapeHtml(name)}</strong>
              <small>${escapeHtml(meta)}</small>
              <i>切替</i>
            </button>
          </div>
          <div class="plan-chip-drawer" data-plan-chip-drawer hidden>
            <div class="plan-chip-drawer-head">
              <span>${escapeHtml(label === '保存先' ? '記録先プランを確認・切替' : '必要な時だけプラン切替')}</span>
              <button type="button" class="plan-chip-close" data-plan-chip-close>閉じる</button>
            </div>
            <div class="plan-chip-actions">${actionHtml}</div>
            <div class="plan-chip-candidates">${chipHtml}</div>
          </div>
        `);

        root.setAttribute(READY_ATTR, '1');
      }

      function enhanceAll() {
        document.querySelectorAll(ROOT_SELECTOR).forEach(enhancePlanSwitch);
      }

      document.addEventListener('click', (event) => {
        const toggle = event.target.closest('[data-plan-chip-toggle]');
        if (toggle) {
          event.preventDefault();
          event.stopPropagation();
          const root = toggle.closest(ROOT_SELECTOR);
          const drawer = root?.querySelector('[data-plan-chip-drawer]');
          if (!drawer) return;
          const willOpen = drawer.hidden;
          closeAllDrawers();
          drawer.hidden = !willOpen;
          toggle.setAttribute('aria-expanded', String(willOpen));
          return;
        }

        if (event.target.closest('[data-plan-chip-close]')) {
          event.preventDefault();
          closeAllDrawers();
          return;
        }

        if (event.target.closest('[data-plan-chip-drawer]')) {
          if (event.target.closest('[data-action]')) {
            window.setTimeout(closeAllDrawers, 0);
          }
          return;
        }

        closeAllDrawers();
      }, true);

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeAllDrawers();
      });

      const observer = new MutationObserver(() => enhanceAll());

      function start() {
        enhanceAll();
        const app = document.getElementById('app');
        if (app) observer.observe(app, { childList: true, subtree: true });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }

      window.setTimeout(enhanceAll, 100);
      window.setTimeout(enhanceAll, 500);
    })();

  </script>
</body>
</html>
