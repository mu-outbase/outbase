<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>OUTBASE</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="style.css?v=phase9j3"><style id="outbaseStableGuard">body:not(.outbase-stable-ready) .page{display:none!important;visibility:hidden!important}body:not(.outbase-stable-ready) #outbaseBootScreen{display:flex!important}body.outbase-stable-ready #outbaseBootScreen{display:none!important}body.outbase-stable-ready #homePage{display:none!important;visibility:hidden!important}body.outbase-stable-ready .page.hidden{display:none!important;visibility:hidden!important}#outbaseBootScreen,#outbaseWalkBootScreenStable{display:none;min-height:calc(100vh - 56px);align-items:center;justify-content:center;padding:24px 16px;background:linear-gradient(180deg,#f4f8f2 0%,#fbfaf5 100%);box-sizing:border-box}.outbase-boot-card{width:min(520px,100%);border-radius:24px;background:#fff;border:1px solid rgba(31,111,58,.12);box-shadow:0 10px 24px rgba(20,81,45,.08);padding:22px;color:#243127}.outbase-boot-title{font-size:24px;font-weight:900;margin-bottom:8px}.outbase-boot-note{font-size:13px;line-height:1.6;color:#6b766c}</style></head><body><header>OUTBASE</header><div id="outbaseBootScreen"><div class="outbase-boot-card"><div class="outbase-boot-title">OUTBASE 起動中</div><div class="outbase-boot-note">Stable Compact構成で起動しています。</div></div></div><div id="outbaseWalkBootScreenStable"><div class="outbase-boot-card"><div class="outbase-boot-title">散歩モード準備中</div><div class="outbase-boot-note">旧散歩画面を出さずに切り替えています。</div></div></div>
