<body>

<script>
/* OUTBASE MVP Alpha 1: one-shot usable flow, no Compact JS dependency */
(function(){
'use strict';
const VERSION='MVP_ALPHA_1';
const P={home:'mvpHomePage',walk:'mvpWalkPage',history:'mvpWalkHistoryPage',result:'mvpWalkResultPage'};
const LS={shop:'outbase_mvpalpha_shopping',pack:'outbase_mvpalpha_packing',kota:'outbase_mvpalpha_kota',reflect:'outbase_mvpalpha_reflection',camp:'outbase_mvpalpha_nextcamp',draft:'outbase_mvpalpha_local_records'};
let photoInput=null,videoInput=null,recorder=null,chunks=[],speech=null,finalText='',interimText='',map=null,line=null,markers=[];
function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function now(){return new Date().toLocaleString()}
function ready(){document.body.classList.add('outbase-mvp-alpha-ready','outbase-stable-ready','outbase-life-ready')}
function isActive(){try{return currentSession&&currentSession.type==='walk'&&currentSession.status===EVENT_STATUS.ACTIVE}catch(e){return false}}
function page(id){let el=$(id);if(el)return el;el=document.createElement('div');el.id=id;el.className='page hidden mvp-page';document.body.insertBefore(el,document.body.querySelector('script'));return el}
function hideAll(){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'))}
function show(id){hideAll();page(id).classList.remove('hidden');ready();window.scrollTo?.(0,0)}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function loadLS(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function textLS(k){try{return localStorage.getItem(k)||''}catch(e){return''}}
function setTextLS(k,v){try{localStorage.setItem(k,v||'')}catch(e){}}
function css(){if($('mvpAlphaCss'))return;const s=document.createElement('style');s.id='mvpAlphaCss';s.textContent=`
:root{--obg:#1f6f3a;--obd:#123d25;--obs:#edf6ee;--obb:#fbfaf5;--obt:#243127;--obm:#6b766c;--obl:#e3ebe2;--obr:#b71c1c;}
body{background:#fbfaf5;color:var(--obt)}.mvp-page{background:linear-gradient(180deg,#f4f8f2,#fbfaf5);min-height:calc(100vh - 60px);padding:14px 14px 96px;box-sizing:border-box}.mvp-wrap{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px}.mvp-card{background:#fff;border:1px solid rgba(31,111,58,.09);border-radius:24px;padding:16px;box-shadow:0 10px 24px rgba(20,81,45,.08);box-sizing:border-box}.mvp-hero{background:linear-gradient(135deg,#1f6f3a,#4f8f5b);color:#fff}.mvp-kicker{font-size:12px;font-weight:900;letter-spacing:.12em;opacity:.9}.mvp-title{font-size:27px;font-weight:900;line-height:1.25;margin:2px 0}.mvp-sub{font-size:13px;line-height:1.55;color:inherit;opacity:.9}.mvp-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mvp-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.mvp-btn{width:100%;min-height:56px;border-radius:18px;border:1px solid var(--obl);background:#fff;color:var(--obd);font-weight:900;font-size:15px;padding:10px;margin:0}.mvp-primary{background:linear-gradient(180deg,var(--obg),var(--obd));color:#fff;border:0}.mvp-danger{background:linear-gradient(180deg,#d4242d,#a5161d);color:#fff;border:0}.mvp-muted{background:#f8faf7;color:#6b766c}.mvp-mini{border:1px solid var(--obl);border-radius:18px;padding:12px;background:#fff;min-height:72px}.mvp-label{font-size:12px;color:var(--obm);line-height:1.5}.mvp-value{font-size:20px;font-weight:900;line-height:1.3}.mvp-note{font-size:13px;color:var(--obm);line-height:1.6}.mvp-textarea{width:100%;min-height:86px;border:1px solid var(--obl);border-radius:16px;padding:10px;font-size:15px;box-sizing:border-box;background:#fbfaf5}.mvp-map{height:230px;border:1px solid var(--obl);border-radius:20px;background:#eef4ee;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;color:var(--obm);font-weight:900}.mvp-pad{min-height:96px;border-radius:24px;background:linear-gradient(180deg,#1f6f3a,#123d25);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:900;font-size:18px;padding:14px;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}.mvp-transcript{border:1px dashed var(--obl);border-radius:16px;background:#fbfaf5;padding:10px;min-height:42px;line-height:1.5}.mvp-nav{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);width:min(720px,calc(100vw - 20px));display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:rgba(255,255,255,.96);border:1px solid rgba(31,111,58,.12);border-radius:22px;box-shadow:0 10px 22px rgba(20,81,45,.12);padding:8px;z-index:80}.mvp-nav button{border:0;background:transparent;color:var(--obm);font-weight:900;min-height:48px;margin:0}.mvp-chip{display:inline-block;border-radius:999px;background:#edf6ee;color:#123d25;padding:6px 10px;font-size:12px;font-weight:900;margin:2px}.mvp-list{display:flex;flex-direction:column;gap:10px}.mvp-row{border:1px solid var(--obl);border-radius:18px;padding:12px;background:#fff}.mvp-small{font-size:12px;color:var(--obm)}
@media(max-width:520px){.mvp-title{font-size:24px}.mvp-card{padding:15px}.mvp-grid3{grid-template-columns:1fr}.mvp-btn{font-size:14px}.mvp-map{height:220px}}
`;document.head.appendChild(s)}
async function getAllRecords(){let records=[];try{if(typeof getRecords==='function')records=await getRecords()}catch(e){}const local=loadLS(LS.draft,[]);return [...records,...local].filter(Boolean)}
function walkRecords(records){return records.filter(r=>r.recordType==='walk'||r.session?.type==='walk').sort((a,b)=>new Date(b.date||b.created_at||0)-new Date(a.date||a.created_at||0))}
function campData(){return loadLS(LS.camp,{name:'次のキャンプ未設定',date:'',weather:'確認前'})}
function campSaveFromHome(){const d=campData();d.name=$('campName')?.value||d.name;d.date=$('campDate')?.value||d.date;d.weather=$('campWeather')?.value||d.weather;saveLS(LS.camp,d);renderHome()}
function memoCard(title,key,placeholder){return `<div class="mvp-card"><b>${title}</b><textarea class="mvp-textarea" data-save-key="${key}" placeholder="${placeholder}">${esc(textLS(key))}</textarea><div class="mvp-note">入力すると自動保存。リンに送るリストや次回準備に使う前提。</div></div>`}
function nav(active){return `<nav class="mvp-nav"><button onclick="OUTBASE_MVP_ALPHA.home()">🏠<br>ホーム</button><button onclick="startWalk()">🐕<br>散歩</button><button onclick="OUTBASE_MVP_ALPHA.history()">📚<br>履歴</button><button onclick="OUTBASE_MVP_ALPHA.focusPrep()">🏕️<br>準備</button></nav>`}
async function renderHome(){css();const records=await getAllRecords();const walks=walkRecords(records);const camp=campData();const active=isActive();page(P.home).innerHTML=`<div class="mvp-wrap">
<section class="mvp-card mvp-hero"><div class="mvp-kicker">OUTBASE MVPα</div><div class="mvp-title">次のキャンプと<br>コタ散歩を迷わず開く。</div><div class="mvp-sub">安定化だけで終わらせず、買い物・持ち物・コタ用品・反省メモまで一括導線化。</div></section>
${active?`<section class="mvp-card"><div class="mvp-value">🐕 コタ散歩が継続中</div><div class="mvp-note">ホームに戻っても散歩は継続。記録操作へ戻れます。</div><button class="mvp-btn mvp-primary" onclick="OUTBASE_MVP_ALPHA.showWalk()">散歩へ戻る</button></section>`:''}
<section class="mvp-card"><b>次のキャンプ準備</b><div class="mvp-grid3" style="margin-top:10px"><div class="mvp-mini"><div class="mvp-label">キャンプ場</div><input id="campName" value="${esc(camp.name)}" style="width:100%;box-sizing:border-box"></div><div class="mvp-mini"><div class="mvp-label">日程</div><input id="campDate" value="${esc(camp.date)}" placeholder="例 7/20-21" style="width:100%;box-sizing:border-box"></div><div class="mvp-mini"><div class="mvp-label">天気</div><input id="campWeather" value="${esc(camp.weather)}" style="width:100%;box-sizing:border-box"></div></div><button class="mvp-btn mvp-primary" onclick="OUTBASE_MVP_ALPHA.saveCamp()">次のキャンプを保存</button></section>
<section class="mvp-card"><b>すぐ使う</b><div class="mvp-grid2" style="margin-top:10px"><button class="mvp-btn mvp-primary" onclick="startWalk()">🐕 コタ散歩開始</button><button class="mvp-btn" onclick="OUTBASE_MVP_ALPHA.history()">📚 散歩履歴</button><button class="mvp-btn" onclick="OUTBASE_MVP_ALPHA.focusPrep()">🛒 買い物・持ち物</button><button class="mvp-btn" onclick="OUTBASE_MVP_ALPHA.quickMemo()">📝 思いつきメモ</button></div></section>
<section class="mvp-card"><b>状態</b><div class="mvp-grid3" style="margin-top:10px"><div class="mvp-mini"><div class="mvp-label">散歩記録</div><div class="mvp-value">${walks.length}件</div></div><div class="mvp-mini"><div class="mvp-label">直近散歩</div><div class="mvp-value">${esc(walks[0]?.date?.split(' ')[0]||'なし')}</div></div><div class="mvp-mini"><div class="mvp-label">MVP</div><div class="mvp-value">α</div></div></div></section>
<div id="prepBlock">${memoCard('🛒 買い物メモ',LS.shop,'例：ピザ用チーズ、エビ、バケット、炭酸水')}${memoCard('🎒 持ち物メモ',LS.pack,'例：ペグ、延長コード、虫よけ、雨対策')}${memoCard('🐕 コタ用品メモ',LS.kota,'例：保冷剤、水、カート、服、足拭き')}${memoCard('🔁 前回の反省メモ',LS.reflect,'例：朝の撤収を早める、ライト配置を変える')}</div>
<section class="mvp-card"><b>最近の散歩</b><div class="mvp-list" style="margin-top:10px">${miniWalkList(walks,3)}</div></section>${nav('home')}</div>`;bindAutoSave(page(P.home));show(P.home)}
function bindAutoSave(root){root.querySelectorAll('[data-save-key]').forEach(t=>{t.oninput=()=>setTextLS(t.dataset.saveKey,t.value)})}
function miniWalkList(walks,limit){if(!walks.length)return '<div class="mvp-note">まだ散歩記録はありません。</div>';return walks.slice(0,limit).map((r,i)=>`<div class="mvp-row"><b>${esc(r.date||'日時なし')}</b><div class="mvp-small">${esc(r.walk?.time||'時間なし')} / ${esc(r.walk?.distanceKm||'距離なし')} / 写真 ${r.photos?.length||r.summary?.photoCount||0}</div><button class="mvp-btn mvp-muted" onclick="OUTBASE_MVP_ALPHA.resultByIndex(${i})">詳細を見る</button></div>`).join('')}
function focusPrep(){renderHome().then(()=>setTimeout(()=>$('prepBlock')?.scrollIntoView({behavior:'smooth',block:'start'}),80))}
function quickMemo(){focusPrep();setTimeout(()=>{const t=document.querySelector('[data-save-key="'+LS.reflect+'"]');if(t)t.focus()},180)}
function initInputs(){if(!photoInput){photoInput=document.createElement('input');photoInput.type='file';photoInput.accept='image/*';photoInput.setAttribute('capture','environment');photoInput.style.display='none';photoInput.onchange=photoAdd;document.body.appendChild(photoInput)}if(!videoInput){videoInput=document.createElement('input');videoInput.type='file';videoInput.accept='video/*';videoInput.setAttribute('capture','environment');videoInput.style.display='none';videoInput.onchange=videoAdd;document.body.appendChild(videoInput)}}
function videos(){window.outbaseMvpVideos=window.outbaseMvpVideos||[];return window.outbaseMvpVideos}
function gpsPoint(g){try{return typeof gpsToLatLng==='function'?gpsToLatLng(g):null}catch(e){return null}}
function place(g){if(!g||g==='取得中')return '取得中';if(g==='未取得')return '未取得';return '現在地（取得済み）'}
function walkHtml(){return `<div class="mvp-wrap"><section class="mvp-card mvp-hero"><div class="mvp-kicker">KOTA WALK</div><div class="mvp-title">コタ散歩</div><div class="mvp-sub">写真・動画・長押し音声メモ・メモ・地図を、現地で迷わず残します。</div></section><section class="mvp-card"><div class="mvp-label">経過時間</div><div id="walkTimerA" class="mvp-title">00:00:00</div><div id="walkLocA" class="mvp-note">開始地点：取得中</div></section><section class="mvp-card"><b>リアルタイム地図</b><div id="walkMapA" class="mvp-map" style="margin-top:10px">GPS取得後に地図を表示します</div></section><section class="mvp-card"><b>記録</b><div class="mvp-grid2" style="margin-top:10px"><button class="mvp-btn" data-act="photo">📷 写真</button><button class="mvp-btn" data-act="video">🎥 動画</button><button class="mvp-btn" data-act="memo">📝 メモ</button><button class="mvp-btn" data-act="history">📚 履歴</button></div><div id="voicePadA" class="mvp-pad" style="margin-top:10px">🎤 長押し音声メモ<br><small>押している間だけ話す / 離すと保存</small></div><div id="voiceTextA" class="mvp-transcript" style="margin-top:10px">文字起こし対応端末ではリアルタイム表示。非対応でも録音保存。</div><div id="walkCountsA" class="mvp-note" style="margin-top:8px"></div></section><section class="mvp-card"><b>終了操作</b><div class="mvp-grid2" style="margin-top:10px"><button class="mvp-btn mvp-primary" data-act="finish">✅ 散歩終了</button><button class="mvp-btn mvp-danger" data-act="discard">🗑️ 散歩を破棄</button></div><button class="mvp-btn mvp-muted" data-act="home">🏠 ホームへ戻る（散歩は継続）</button><div id="walkStatusA" class="mvp-note">散歩中です。</div></section>${nav('walk')}</div>`}
function bindWalk(){const d=page(P.walk);d.onclick=e=>{const b=e.target.closest('[data-act]');if(!b)return;const k=b.dataset.act;if(k==='photo')photoInput.click();if(k==='video')videoInput.click();if(k==='memo')memoAdd();if(k==='history')renderHistory(true);if(k==='home')renderHome();if(k==='finish')finishWalkA();if(k==='discard')discardWalkA()};const pad=$('voicePadA');if(pad){pad.onpointerdown=e=>{e.preventDefault();try{pad.setPointerCapture(e.pointerId)}catch(_){}voiceStart()};pad.onpointerup=e=>{e.preventDefault();voiceStop()};pad.onpointercancel=voiceStop;pad.oncontextmenu=e=>e.preventDefault();pad.ontouchstart=e=>e.preventDefault()}}
function showWalk(){css();initInputs();const d=page(P.walk);if(!d.dataset.ready){d.innerHTML=walkHtml();d.dataset.ready='1'}show(P.walk);bindWalk();updateWalk()}
function updateWalk(){timerUpdate();countUpdate();locationUpdate();mapUpdate()}
function timerUpdate(){if(!currentSession?.startTimestamp)return;seconds=Math.floor((Date.now()-currentSession.startTimestamp)/1000);const t=$('walkTimerA');if(t&&typeof formatTime==='function')t.textContent=formatTime(seconds)}
function countUpdate(){const c=$('walkCountsA');if(c)c.textContent=`写真 ${photos?.length||0} / 動画 ${videos().length} / 音声 ${audioRecords?.length||0} / メモ ${notes?.length||0}`}
function locationUpdate(){const latest=[...(gpsHistory||[])].reverse().find(p=>gpsPoint(p.gps));const l=$('walkLocA');if(l)l.textContent=`開始地点：${place(startGps)} / 現在地：${latest?place(latest.gps):'取得中'}`}
function mapUpdate(){const e=$('walkMapA');if(!e)return;if(typeof L==='undefined'){e.textContent='地図ライブラリ読込待ち';return}const pts=(gpsHistory||[]).map(p=>gpsPoint(p.gps)).filter(Boolean);if(!pts.length){e.textContent='GPS取得後に地図を表示します';return}if(!map){e.textContent='';map=L.map('walkMapA').setView(pts[0],17);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)}markers.forEach(m=>m.remove());markers=[];if(line){line.remove();line=null}markers.push(L.marker(pts[0]).addTo(map).bindPopup('開始'));markers.push(L.marker(pts[pts.length-1]).addTo(map).bindPopup('現在地'));if(pts.length>1){line=L.polyline(pts,{weight:5}).addTo(map);map.fitBounds(pts,{padding:[24,24]})}else{map.setView(pts[0],17)}setTimeout(()=>map.invalidateSize(),80)}
function startWalkA(){if(isActive())return showWalk();try{if(typeof hasActiveState==='function'&&hasActiveState()){alert('進行中の記録があります。復旧または終了してから開始してください。');return}}catch(e){}window.outbaseMvpVideos=[];seconds=0;photos=[];notes=[];audioRecords=[];audioChunks=[];gpsHistory=[];mediaRecorder=null;startGps='取得中';endGps='未取得';distanceKm='未取得';map=null;line=null;markers=[];currentSession={id:typeof createId==='function'?createId():'ob_'+Date.now(),type:'walk',startTime:now(),startTimestamp:Date.now(),endTime:'',status:EVENT_STATUS.ACTIVE};try{setAppState?.({page:'walk',eventId:currentSession.id,eventType:'walk',eventStatus:EVENT_STATUS.ACTIVE});startAutoSave?.();saveWalkActiveSession?.('mvp-alpha-start')}catch(e){}showWalk();if(typeof getGps==='function')getGps(g=>{startGps=g||'未取得';if(typeof addGpsHistory==='function')addGpsHistory('start',startGps);try{saveWalkActiveSession?.('mvp-alpha-startGps')}catch(e){}updateWalk()});if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(timerUpdate,1000);if(gpsWatcher)clearInterval(gpsWatcher);gpsWatcher=setInterval(()=>{if(typeof getGps!=='function'||!isActive())return;getGps(g=>{if(typeof addGpsHistory==='function')addGpsHistory('point',g);try{saveWalkActiveSession?.('mvp-alpha-gps')}catch(e){}updateWalk()})},GPS_INTERVAL_MS||10000)}
function restoreWalkA(entry){const y=entry?.payload||{};currentSession=y.currentSession;if(!currentSession){alert('散歩記録を復旧できませんでした');return}currentSession.status=EVENT_STATUS.ACTIVE;if(!currentSession.startTimestamp)currentSession.startTimestamp=Date.now()-((y.seconds||0)*1000);seconds=Math.floor((Date.now()-currentSession.startTimestamp)/1000);photos=Array.isArray(y.photos)?y.photos:[];notes=Array.isArray(y.notes)?y.notes:[];audioRecords=Array.isArray(y.audioRecords)?y.audioRecords:[];gpsHistory=Array.isArray(y.gpsHistory)?y.gpsHistory:[];startGps=y.startGps||'未取得';endGps=y.endGps||'未取得';distanceKm=y.distanceKm||'未取得';showWalk();if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(timerUpdate,1000)}
function status(t){const s=$('walkStatusA');if(s)s.textContent=t}
function transcript(t){const v=$('voiceTextA');if(v)v.textContent=t}
function photoAdd(){const f=photoInput?.files?.[0];if(!f)return;const r=new FileReader();r.onload=e=>{photos.push({id:typeof createId==='function'?createId():'p_'+Date.now(),name:f.name,type:f.type,data:e.target.result,time:now(),created_at:new Date().toISOString()});try{saveWalkActiveSession?.('mvp-alpha-photo')}catch(_){}photoInput.value='';countUpdate();status('写真を保存しました')};r.readAsDataURL(f)}
function videoAdd(){const f=videoInput?.files?.[0];if(!f)return;const r=new FileReader();r.onload=e=>{videos().push({id:typeof createId==='function'?createId():'v_'+Date.now(),name:f.name,type:f.type,data:e.target.result,time:now(),created_at:new Date().toISOString()});try{saveWalkActiveSession?.('mvp-alpha-video')}catch(_){}videoInput.value='';countUpdate();status('動画を保存しました')};r.readAsDataURL(f)}
function memoAdd(){const t=prompt('散歩メモ','');if(!t||!t.trim())return;notes.push({id:typeof createId==='function'?createId():'m_'+Date.now(),text:t.trim(),time:now(),created_at:new Date().toISOString()});try{saveWalkActiveSession?.('mvp-alpha-note')}catch(_){}countUpdate();status('メモを保存しました')}
async function voiceStart(){if(recorder)return;finalText='';interimText='';const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){try{speech=new SR();speech.lang='ja-JP';speech.interimResults=true;speech.continuous=true;speech.onresult=e=>{interimText='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)finalText+=t;else interimText+=t}transcript('文字起こし中：'+(finalText+interimText||'話してください'))};speech.onerror=()=>transcript('文字起こし失敗時も録音は保存します');speech.start()}catch(e){speech=null}}try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});chunks=[];recorder=new MediaRecorder(stream);recorder.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data)};recorder.start();status('長押し音声メモ中。離すと保存します。');if(!SR)transcript('この端末は文字起こし非対応です。録音保存します。')}catch(e){status('音声メモを開始できません')}}
function voiceStop(){if(speech){try{speech.stop()}catch(e){}speech=null}if(!recorder)return;const r=recorder;recorder=null;r.onstop=()=>{const blob=new Blob(chunks,{type:r.mimeType||'audio/webm'});const text=(finalText+interimText).trim();const fr=new FileReader();fr.onload=e=>{audioRecords.push({id:typeof createId==='function'?createId():'a_'+Date.now(),name:'walk_audio_'+Date.now()+'.webm',type:blob.type,data:e.target.result,time:now(),created_at:new Date().toISOString(),transcript:text});if(text)notes.push({id:typeof createId==='function'?createId():'s_'+Date.now(),text,time:now(),created_at:new Date().toISOString(),source:'speech'});try{saveWalkActiveSession?.('mvp-alpha-audio')}catch(_){}countUpdate();status(text?'音声メモを文字メモ化しました':'音声メモを保存しました');transcript(text?'保存した文字メモ：'+text:'文字起こしなし。録音を保存しました。');r.stream.getTracks().forEach(k=>k.stop())};fr.readAsDataURL(blob)};try{r.stop()}catch(e){}}
async function saveRecordSafe(record){let saved=false;try{if(typeof saveRecord==='function'){await saveRecord(record);saved=true}}catch(e){}if(!saved){const arr=loadLS(LS.draft,[]);arr.unshift(record);saveLS(LS.draft,arr.slice(0,30))}return saved}
async function finishWalkA(){if(!isActive()){alert('進行中の散歩が見つかりません');return}if(!confirm('散歩を終了して保存しますか？'))return;if(timerInterval)clearInterval(timerInterval);if(gpsWatcher)clearInterval(gpsWatcher);try{stopAutoSave?.()}catch(e){}const done=async g=>{endGps=g||'未取得';if(typeof addGpsHistory==='function')addGpsHistory('end',endGps);distanceKm=typeof calcTrackDistance==='function'?calcTrackDistance(gpsHistory):'0.00km';const walkTime=typeof formatTime==='function'?formatTime(seconds||0):'00:00:00';const avg=typeof calcAverageSpeed==='function'?calcAverageSpeed(distanceKm,walkTime):'0.00km/h';currentSession.endTime=now();currentSession.status=EVENT_STATUS.CLOSED;const record={id:typeof createId==='function'?createId():'r_'+Date.now(),title:'コタ散歩記録',tags:['コタ','散歩'],recordType:'walk',session:currentSession,date:now(),walk:{time:walkTime,distanceKm,avgSpeed:avg,startLabel:place(startGps),endLabel:place(endGps)},gps:{start:startGps,end:endGps,history:gpsHistory},photos,audio:audioRecords,notes,videos:videos(),quickEvents:[],friendDogEvents:[],spotEvents:[],behaviorEvents:[],summary:{photoCount:photos.length,videoCount:videos().length,audioCount:audioRecords.length,noteCount:notes.length,gpsPointCount:gpsHistory.length,validGpsPointCount:typeof getValidGpsCount==='function'?getValidGpsCount(gpsHistory):gpsHistory.length,quickEventCount:0,friendDogCount:0,spotCount:0}};await saveRecordSafe(record);try{if(currentSession?.id&&typeof deleteActiveSession==='function')await deleteActiveSession(currentSession.id);clearAppState?.()}catch(e){}currentSession=null;result(record)};if(typeof getGps==='function')getGps(done);else done('未取得')}
async function discardWalkA(){if(!isActive())return renderHome();if(!confirm('この散歩記録を保存せずに破棄しますか？'))return;if(!confirm('写真・音声・メモもこの散歩記録から外れます。破棄しますか？'))return;if(timerInterval)clearInterval(timerInterval);if(gpsWatcher)clearInterval(gpsWatcher);try{stopAutoSave?.();if(currentSession?.id&&typeof deleteActiveSession==='function')await deleteActiveSession(currentSession.id);clearAppState?.()}catch(e){}currentSession=null;seconds=0;photos=[];notes=[];audioRecords=[];gpsHistory=[];startGps='未取得';endGps='未取得';distanceKm='未取得';window.outbaseMvpVideos=[];map=null;renderHome()}
function result(r){page(P.result).innerHTML=`<div class="mvp-wrap"><section class="mvp-card mvp-hero"><div class="mvp-kicker">WALK RESULT</div><div class="mvp-title">コタ散歩を保存しました</div><div class="mvp-sub">開始：${esc(r.walk.startLabel)} / 終了：${esc(r.walk.endLabel)}</div></section><section class="mvp-card"><div class="mvp-grid2"><div class="mvp-mini"><div class="mvp-label">時間</div><div class="mvp-value">${esc(r.walk.time)}</div></div><div class="mvp-mini"><div class="mvp-label">距離</div><div class="mvp-value">${esc(r.walk.distanceKm)}</div></div><div class="mvp-mini"><div class="mvp-label">写真</div><div class="mvp-value">${r.summary.photoCount}</div></div><div class="mvp-mini"><div class="mvp-label">メモ</div><div class="mvp-value">${r.summary.noteCount}</div></div></div></section><section class="mvp-card"><b>次回メモにつなげる</b><div class="mvp-grid2" style="margin-top:10px"><button class="mvp-btn" onclick="OUTBASE_MVP_ALPHA.appendReflection('コタ散歩：${esc((r.notes||[]).map(n=>n.text).filter(Boolean).join(' / ')).replaceAll('\n',' ')}')">反省メモへ追加</button><button class="mvp-btn mvp-primary" onclick="OUTBASE_MVP_ALPHA.home()">ホームへ戻る</button></div></section>${nav('result')}</div>`;show(P.result)}
function appendReflection(t){const cur=textLS(LS.reflect);setTextLS(LS.reflect,(cur?cur+'\n':'')+(t||'散歩の気づき'));renderHome().then(()=>focusPrep())}
async function renderHistory(fromWalk){const records=await getAllRecords();const walks=walkRecords(records);page(P.history).innerHTML=`<div class="mvp-wrap"><section class="mvp-card mvp-hero"><div class="mvp-kicker">WALK HISTORY</div><div class="mvp-title">最近の散歩</div><div class="mvp-sub">散歩中でもダラダラ出さず、最近5件だけ確認します。</div></section><section class="mvp-card"><div class="mvp-list">${miniWalkList(walks,5)}</div></section><section class="mvp-card"><div class="mvp-grid2"><button class="mvp-btn" onclick="OUTBASE_MVP_ALPHA.home()">ホームへ</button>${isActive()?'<button class="mvp-btn mvp-primary" onclick="OUTBASE_MVP_ALPHA.showWalk()">散歩へ戻る</button>':''}</div></section>${nav('history')}</div>`;show(P.history)}
async function resultByIndex(i){const walks=walkRecords(await getAllRecords());const r=walks[i];if(!r)return;result({walk:{time:r.walk?.time||'',distanceKm:r.walk?.distanceKm||'',startLabel:r.walk?.startLabel||'',endLabel:r.walk?.endLabel||''},summary:{photoCount:r.photos?.length||r.summary?.photoCount||0,noteCount:r.notes?.length||r.summary?.noteCount||0},notes:r.notes||[]})}
function route(id){if(!id||id==='home'||id==='homePage'||id===P.home)return renderHome();if(id==='walk'||id==='walkPage'||id===P.walk)return isActive()?showWalk():show(P.walk);if(id==='walkHistoryPage'||id===P.history)return renderHistory(false);show(id)}
function patch(){window.showPage=route;window.backToHome=()=>renderHome();window.startWalk=startWalkA;window.restoreWalkSession=restoreWalkA;window.finishWalk=finishWalkA;window.OUTBASE_MVP_ALPHA={version:VERSION,home:renderHome,showWalk,startWalk:startWalkA,finish:finishWalkA,discard:discardWalkA,history:()=>renderHistory(false),focusPrep,quickMemo,saveCamp:campSaveFromHome,resultByIndex,appendReflection,route}}
function boot(){css();page(P.home);page(P.walk);page(P.history);page(P.result);patch();ready();isActive()?showWalk():renderHome()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
window.addEventListener('load',()=>setTimeout(()=>{patch();isActive()?showWalk():renderHome()},450));
})();
