<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OUTBASE</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
OUTBASE
</header>

<!-- ホーム -->

<div id="homePage" class="page">

<div class="card">

<h1>今日の記録</h1>

<button onclick="startWalk()">
散歩開始
</button>

<button onclick="alert('キャンプモード準備中')">
キャンプ開始
</button>

<div id="storageInfo">
保存基盤確認中...
</div>

</div>

<div class="card">

<h1>最近の記録</h1>

<div id="recordList">

記録なし

</div>

</div>

</div>

<!-- 散歩中 -->

<div id="walkPage" class="page hidden">

<div class="card">

<h1>散歩中</h1>

<div id="timer" class="timer">
00:00:00
</div>

<div id="gpsInfo">
GPS取得中...
</div>

</div>

<div class="card">

<h2>写真</h2>

<input
type="file"
id="photoInput"
accept="image/*"
multiple
style="display:none"
onchange="addPhoto()">

<button onclick="document.getElementById('photoInput').click()">
写真追加
</button>

<div id="photoInfo">
写真 0枚
</div>

<div id="photoPreview">
</div>

</div>

<div class="card">

<h2>音声</h2>

<button onclick="startRecording()">
録音開始
</button>

<button onclick="stopRecording()">
録音停止
</button>

<div id="audioInfo">
音声 0件
</div>

<div id="audioList">
</div>

</div>

<div class="card">

<h2>メモ</h2>

<textarea
id="noteInput"
placeholder="メモを入力">
</textarea>

<button onclick="addNote()">
メモ追加
</button>

<div id="noteInfo">
メモ 0件
</div>

<div id="noteList">
</div>

</div>

<div class="card">

<button onclick="finishWalk()">
散歩終了
</button>

</div>

</div>

<!-- 詳細画面 -->

<div id="detailPage" class="page hidden">

<div class="card">

<h1>記録詳細</h1>

<div id="detailContent">
</div>

<button onclick="backToHome()">
戻る
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
