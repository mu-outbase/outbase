<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6f5f1">
  <title>OUTBASE</title>
  <link rel="manifest" href="manifest.json?v=library10a-release1">
  <link rel="stylesheet" href="style.css?v=outbase-memory-fix1">
</head>
<body>
  <div id="app"></div>
  <input id="fileInput" type="file" accept=".json,.txt,.csv,.md,.xlsx,.xls,image/*,video/*" multiple hidden>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister())).catch(()=>{});
    }
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(()=>{});
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@7/dist/tesseract.min.js" defer></script>
  <script src="src/app.js?v=library10a-release1" defer></script>
</body>
</html>
