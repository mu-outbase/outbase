<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OUTBASE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<header>OUTBASE</header>

<div id="homePage" class="page">

  <div class="card">
    <h1>今日の記録</h1>

    <button onclick="startWalk()">
      散歩開始
    </button>

    <button onclick="startCamp()">
      キャンプ開始
    </button>

    <div id="storageInfo">
      保存基盤確認中...
    </div>
  </div>

  <div class="card">

    <h1>記録検索</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="タイトル・タグ・メモ検索">

    <button onclick="searchRecords()">
      検索
    </button>

    <button onclick="clearSearch()">
      検索解除
    </button>

  </div>

  <div class="card">
    <h1>累計</h1>
    <div id="stats">
      集計中...
    </div>
  </div>

  <div class="card">
    <h1>最近の記録</h1>
    <div id="recordList">
      記録なし
    </div>
  </div>

</div>

<div id="walkPage" class="page hidden">

  <div class="card">

    <h1>散歩中</h1>

    <div id="timer" class="timer">
      00:00:00
    </div>

    <div id="gpsInfo">
      GPS取得中...
    </div>

  </div>

  <div class="card">

    <h2>タイトル</h2>

    <input
      type="text"
      id="titleInput"
      placeholder="例：朝散歩">

    <h2>タグ</h2>

    <input
      type="text"
      id="tagInput"
      placeholder="例：コタ,公園,朝">

  </div>

  <div class="card">

    <h2>写真</h2>

    <input
      type="file"
      id="photoInput"
      accept="image/*"
      multiple
      style="display:none"
      onchange="addPhoto()">

    <button onclick="document.getElementById('photoInput').click()">
      写真追加
    </button>

    <div id="photoInfo">
      写真 0枚
    </div>

    <div id="photoPreview"></div>

  </div>

  <div class="card">

    <h2>音声</h2>

    <button onclick="startRecording()">
      録音開始
    </button>

    <button onclick="stopRecording()">
      録音停止
    </button>

    <div id="audioInfo">
      音声 0件
    </div>

    <div id="audioList"></div>

  </div>

  <div class="card">

    <h2>メモ</h2>

    <textarea
      id="noteInput"
      placeholder="メモを入力"></textarea>

    <button onclick="addNote()">
      メモ追加
    </button>

    <div id="noteInfo">
      メモ 0件
    </div>

    <div id="noteList"></div>

  </div>

  <div class="card">
    <button onclick="finishWalk()">
      散歩終了
    </button>
  </div>

</div>

<div id="campPage" class="page hidden">

  <div class="card">

    <h1>キャンプ中</h1>

    <div id="campInfo">
      キャンプ未開始
    </div>

  </div>

  <div class="card">

    <h2>キャンプ場</h2>

    <input
      type="text"
      id="campSiteNameInput"
      placeholder="例：Lake Lodge YAMANAKA">

    <h2>エリア・サイト</h2>

    <input
      type="text"
      id="campAreaInput"
      placeholder="例：ドッグフリーサイトA">

    <h2>宿泊数</h2>

    <input
      type="text"
      id="campStayInput"
      placeholder="例：2泊3日">

    <h2>参加者</h2>

    <input
      type="text"
      id="campMemberInput"
      placeholder="例：むー、リン">

    <h2>ペット</h2>

    <input
      type="text"
      id="campPetInput"
      placeholder="例：コタ、アオ、エラ、ユキ">

    <h2>天候</h2>

    <input
      type="text"
      id="campWeatherInput"
      placeholder="例：晴れ 24℃">

  </div>

  <div class="card">

    <h2>写真</h2>

    <input
      type="file"
      id="campPhotoInput"
      accept="image/*"
      multiple
      style="display:none"
      onchange="addCampPhoto()">

    <button onclick="document.getElementById('campPhotoInput').click()">
      写真追加
    </button>

    <div id="campPhotoInfo">
      写真 0枚
    </div>

    <div id="campPhotoPreview"></div>

  </div>

  <div class="card">

    <h2>ギア</h2>

    <input
      type="text"
      id="campGearInput"
      placeholder="例：ランドロックMFS">

    <button onclick="addCampGear()">
      ギア追加
    </button>

    <div id="campGearList">
      ギアなし
    </div>

  </div>

  <div class="card">

    <h2>料理</h2>

    <input
      type="text"
      id="campMealInput"
      placeholder="例：パエリア">

    <button onclick="addCampMeal()">
      料理追加
    </button>

    <div id="campMealList">
      料理なし
    </div>

  </div>

  <div class="card">

    <h2>メモ</h2>

    <textarea
      id="campNoteInput"
      placeholder="気付き・改善点・レビュー候補"></textarea>

    <button onclick="addCampNote()">
      メモ追加
    </button>

    <div id="campNoteInfo">
      メモ 0件
    </div>

    <div id="campNoteList">
      メモなし
    </div>

  </div>

  <div class="card">

    <button onclick="finishCamp()">
      キャンプ終了
    </button>

    <button
      class="cancelButton"
      onclick="cancelCamp()">
      キャンセル
    </button>

  </div>

</div>

<div id="detailPage" class="page hidden">

  <div class="card">

    <h1>記録詳細</h1>

    <div id="detailContent"></div>

    <button onclick="backToHome()">
      戻る
    </button>

  </div>

</div>


<div
  id="recoveryModal"
  class="modal hidden">

  <div class="modal-inner recovery-inner" onclick="event.stopPropagation()">

    <div class="recovery-card">

      <h1>未終了の記録があります</h1>

      <div class="detail-section">
        <div class="detail-title">種類</div>
        <div id="recoveryType" class="detail-value">
          確認中
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-title">内容</div>
        <div id="recoveryInfo" class="detail-value">
          確認中
        </div>
      </div>

      <button onclick="restorePendingSession()">
        復旧する
      </button>

      <button
        class="deleteButton"
        onclick="discardPendingSession()">
        破棄する
      </button>

    </div>

  </div>

</div>

<div
  id="photoModal"
  class="modal hidden"
  onclick="closePhoto()">

  <div class="modal-inner" onclick="event.stopPropagation()">

    <button
      class="modal-close"
      onclick="closePhoto()">
      ×
    </button>

    <img id="modalPhoto">

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="gps.js"></script>
<script src="stateManager.js"></script>
<script src="sessionManager.js"></script>
<script src="autoSave.js"></script>
<script src="search.js"></script>
<script src="app.js"></script>
<script src="review.js"></script>
<script src="detail.js"></script>
<script src="edit.js"></script>
<script src="camp.js"></script>
<script src="recovery.js"></script>

</body>
</html>
