name: OUTBASE Core06.03 Record UX Polish unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core06_03_RecordUXPolish.zip'
      - '.github/workflows/unpack-core06-03.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core06_03_RecordUXPolish.zip

      - name: Unzip Core06.03 package
        run: |
          set -e
          rm -rf /tmp/outbase_core06_03
          mkdir -p /tmp/outbase_core06_03
          unzip -o OUTBASE_MVPB_Core06_03_RecordUXPolish.zip -d /tmp/outbase_core06_03
          ls -la /tmp/outbase_core06_03
          if [ -d /tmp/outbase_core06_03/OUTBASE_MVPB_Core06_03_RecordUXPolish ]; then
            cp -R /tmp/outbase_core06_03/OUTBASE_MVPB_Core06_03_RecordUXPolish/. ./
          else
            cp -R /tmp/outbase_core06_03/. ./
          fi
          rm -f OUTBASE_MVPB_Core06_03_RecordUXPolish.zip
          rm -rf OUTBASE_MVPB_Core06_02_RecordModeMapConfirm

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core06.03 record UX polish"
            git push
          fi
