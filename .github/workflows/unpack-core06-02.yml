name: OUTBASE Core06.02 Record Mode Map Confirm unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core06_02_RecordModeMapConfirm.zip'
      - '.github/workflows/unpack-core06-02.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core06_02_RecordModeMapConfirm.zip

      - name: Unzip Core06.02 package
        run: |
          set -e
          rm -rf /tmp/outbase_core06_02
          mkdir -p /tmp/outbase_core06_02
          unzip -o OUTBASE_MVPB_Core06_02_RecordModeMapConfirm.zip -d /tmp/outbase_core06_02
          ls -la /tmp/outbase_core06_02
          cp -R /tmp/outbase_core06_02/. ./
          rm -f OUTBASE_MVPB_Core06_02_RecordModeMapConfirm.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core06.02 record mode map confirm"
            git push
          fi
