name: Unpack Core07.1 Fixed ZIP

on:
  push:
    paths:
      - 'OUTBASE_Core07_1_WEATHER_DECISION_FIXED_完成版.zip'
      - '.github/workflows/unpack-core07-fixed.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Core07.1 fixed package
        run: |
          unzip -o "OUTBASE_Core07_1_WEATHER_DECISION_FIXED_完成版.zip" -d .
          rm -f "OUTBASE_Core07_1_WEATHER_DECISION_FIXED_完成版.zip"

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Core07.1 weather decision fixed" || echo "No changes to commit"
          git push
