name: OUTBASE Core05.7 Calendar Refined unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_7_CalendarRefined.zip'
      - '.github/workflows/unpack-core05-7.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core05_7_CalendarRefined.zip

      - name: Unzip Core05.7 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_7
          mkdir -p /tmp/outbase_core05_7
          unzip -o OUTBASE_MVPB_Core05_7_CalendarRefined.zip -d /tmp/outbase_core05_7
          ls -la /tmp/outbase_core05_7
          cp -R /tmp/outbase_core05_7/OUTBASE_MVPB_CORE05_7_CALENDAR_REFINED/. ./
          rm -f OUTBASE_MVPB_Core05_7_CalendarRefined.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.7 calendar home refined"
            git push
          fi
