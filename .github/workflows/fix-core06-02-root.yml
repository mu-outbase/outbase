name: Fix OUTBASE Core06.02 root placement

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-core06-02-root.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy nested Core06.02 files to app root
        run: |
          set -e
          test -d OUTBASE_MVPB_Core06_02_RecordModeMapConfirm
          cp -R OUTBASE_MVPB_Core06_02_RecordModeMapConfirm/. ./
          rm -rf OUTBASE_MVPB_Core06_02_RecordModeMapConfirm
          rm -f OUTBASE_MVPB_Core06_02_RecordModeMapConfirm.zip

      - name: Commit fixed root files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix OUTBASE Core06.02 root placement"
            git push
          fi
