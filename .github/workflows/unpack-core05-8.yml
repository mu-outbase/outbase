name: OUTBASE Core05.8 Interactive Calendar unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_8_CalendarInteractive.zip'
      - '.github/workflows/unpack-core05-8.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core05_8_CalendarInteractive.zip

      - name: Unzip Core05.8 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_8
          mkdir -p /tmp/outbase_core05_8
          unzip -o OUTBASE_MVPB_Core05_8_CalendarInteractive.zip -d /tmp/outbase_core05_8
          ls -la /tmp/outbase_core05_8
          cp -R /tmp/outbase_core05_8/OUTBASE_MVPB_CORE05_8_CALENDAR_INTERACTIVE/. ./
          rm -f OUTBASE_MVPB_Core05_8_CalendarInteractive.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.8 interactive calendar"
            git push
          fi
