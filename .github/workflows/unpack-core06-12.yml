name: OUTBASE Core06.12 Scroll Restore unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core06_12_ScrollRestore.zip'
      - '.github/workflows/unpack-core06-12.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core06_12_ScrollRestore.zip

      - name: Unzip Core06.12 package
        run: |
          set -e
          rm -rf /tmp/outbase_core06_12
          mkdir -p /tmp/outbase_core06_12
          unzip -o OUTBASE_MVPB_Core06_12_ScrollRestore.zip -d /tmp/outbase_core06_12
          ls -la /tmp/outbase_core06_12
          if [ -d /tmp/outbase_core06_12/OUTBASE_MVPB_Core06_12_ScrollRestore ]; then
            cp -R /tmp/outbase_core06_12/OUTBASE_MVPB_Core06_12_ScrollRestore/. ./
          else
            cp -R /tmp/outbase_core06_12/. ./
          fi
          rm -f OUTBASE_MVPB_Core06_12_ScrollRestore.zip
          rm -rf OUTBASE_MVPB_Core06_09_PremiumInteractionUX OUTBASE_MVPB_Core06_10_GlobalUIReset OUTBASE_MVPB_Core06_11_BottomSpacingFinal

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core06.12 scroll restore"
            git push
          fi
