name: Unpack Core06.10 Calendar Product Recovery

on:
  push:
    paths:
      - 'OUTBASE_Core06_10_CALENDAR_PRODUCT_RECOVERY_完成版.zip'
      - '.github/workflows/unpack-core06-10.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Core06.10 package
        run: |
          unzip -o "OUTBASE_Core06_10_CALENDAR_PRODUCT_RECOVERY_完成版.zip" -d .
          rm -f "OUTBASE_Core06_10_CALENDAR_PRODUCT_RECOVERY_完成版.zip"

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Core06.10 calendar product recovery" || echo "No changes to commit"
          git push 
