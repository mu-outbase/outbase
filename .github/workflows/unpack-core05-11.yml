name: OUTBASE Core05.11 Jorte Refined Confirm unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_11_JorteRefinedConfirm.zip'
      - '.github/workflows/unpack-core05-11.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core05_11_JorteRefinedConfirm.zip

      - name: Unzip Core05.11 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_11
          mkdir -p /tmp/outbase_core05_11
          unzip -o OUTBASE_MVPB_Core05_11_JorteRefinedConfirm.zip -d /tmp/outbase_core05_11
          ls -la /tmp/outbase_core05_11
          cp -R /tmp/outbase_core05_11/OUTBASE_MVPB_CORE05_11_JORTE_REFINED_CONFIRM/. ./
          rm -f OUTBASE_MVPB_Core05_11_JorteRefinedConfirm.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.11 Jorte refined confirm"
            git push
          fi
