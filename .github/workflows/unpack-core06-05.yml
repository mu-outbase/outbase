name: OUTBASE Core06.05 All Pages Visual Unify unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core06_05_AllPagesVisualUnify.zip'
      - '.github/workflows/unpack-core06-05.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core06_05_AllPagesVisualUnify.zip

      - name: Unzip Core06.05 package
        run: |
          set -e
          rm -rf /tmp/outbase_core06_05
          mkdir -p /tmp/outbase_core06_05
          unzip -o OUTBASE_MVPB_Core06_05_AllPagesVisualUnify.zip -d /tmp/outbase_core06_05
          ls -la /tmp/outbase_core06_05
          if [ -d /tmp/outbase_core06_05/OUTBASE_MVPB_Core06_05_AllPagesVisualUnify ]; then
            cp -R /tmp/outbase_core06_05/OUTBASE_MVPB_Core06_05_AllPagesVisualUnify/. ./
          else
            cp -R /tmp/outbase_core06_05/. ./
          fi
          rm -f OUTBASE_MVPB_Core06_05_AllPagesVisualUnify.zip
          rm -rf OUTBASE_MVPB_Core06_02_RecordModeMapConfirm OUTBASE_MVPB_Core06_03_RecordUXPolish OUTBASE_MVPB_Core06_04_RecordFieldUX

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core06.05 all pages visual unify"
            git push
          fi
