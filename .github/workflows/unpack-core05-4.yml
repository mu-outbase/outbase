name: OUTBASE Core05.4 Ergonomic Design unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_4_ErgoDesign.zip'
      - '.github/workflows/unpack-core05-4.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Core05.4 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_4
          mkdir -p /tmp/outbase_core05_4
          unzip -o OUTBASE_MVPB_Core05_4_ErgoDesign.zip -d /tmp/outbase_core05_4
          cp -R /tmp/outbase_core05_4/OUTBASE_MVPB_CORE05_4_ERGO_DESIGN/. ./
          rm -f OUTBASE_MVPB_Core05_4_ErgoDesign.zip

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.4 ergonomic design"
            git push
          fi
