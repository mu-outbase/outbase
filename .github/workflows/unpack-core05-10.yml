name: OUTBASE Core05.10 Jorte Refined unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_10_JorteRefined.zip'
      - '.github/workflows/unpack-core05-10.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core05_10_JorteRefined.zip

      - name: Unzip Core05.10 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_10
          mkdir -p /tmp/outbase_core05_10
          unzip -o OUTBASE_MVPB_Core05_10_JorteRefined.zip -d /tmp/outbase_core05_10
          ls -la /tmp/outbase_core05_10
          cp -R /tmp/outbase_core05_10/OUTBASE_MVPB_CORE05_10_JORTE_REFINED/. ./
          rm -f OUTBASE_MVPB_Core05_10_JorteRefined.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.10 Jorte functions refined design"
            git push
          fi
