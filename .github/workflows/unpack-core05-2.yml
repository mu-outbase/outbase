name: OUTBASE Core05.2 unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_2_IntuitiveUX.zip'
      - '.github/workflows/unpack-core05-2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Core05.2 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_2
          mkdir -p /tmp/outbase_core05_2
          unzip -o OUTBASE_MVPB_Core05_2_IntuitiveUX.zip -d /tmp/outbase_core05_2
          cp -R /tmp/outbase_core05_2/OUTBASE_MVPB_CORE05_2_INTUITIVE_UX/. ./
          rm -f OUTBASE_MVPB_Core05_2_IntuitiveUX.zip

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.2 intuitive UX"
            git push
          fi
