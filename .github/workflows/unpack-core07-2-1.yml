name: Unpack Core07.2.1 ZIP

on:
  push:
    paths:
      - 'OUTBASE_Core07_2_1_PREP_USABILITY_完成版.zip'
      - '.github/workflows/unpack-core07-2-1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Core07.2.1 package
        run: |
          unzip -o "OUTBASE_Core07_2_1_PREP_USABILITY_完成版.zip" -d .
          rm -f "OUTBASE_Core07_2_1_PREP_USABILITY_完成版.zip"

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Core07.2.1 prep usability" || echo "No changes to commit"
          git push
