name: Unpack Core08-C ZIP

on:
  push:
    paths:
      - 'OUTBASE_Core08_C_PREP_WORKSPACE_STABLE_完成版.zip'
      - '.github/workflows/unpack-core08-c.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip Core08-C package
        run: |
          unzip -o "OUTBASE_Core08_C_PREP_WORKSPACE_STABLE_完成版.zip" -d .
          rm -f "OUTBASE_Core08_C_PREP_WORKSPACE_STABLE_完成版.zip"
      - name: Commit unpacked files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Core08-C prep workspace stable" || echo "No changes to commit"
          git push
