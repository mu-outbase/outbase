name: OUTBASE Core05.13 Calendar Entrance unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_13_CalendarEntrance.zip'
      - '.github/workflows/unpack-core05-13.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core05_13_CalendarEntrance.zip

      - name: Unzip Core05.13 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_13
          mkdir -p /tmp/outbase_core05_13
          unzip -o OUTBASE_MVPB_Core05_13_CalendarEntrance.zip -d /tmp/outbase_core05_13
          ls -la /tmp/outbase_core05_13
          cp -R /tmp/outbase_core05_13/. ./
          rm -f OUTBASE_MVPB_Core05_13_CalendarEntrance.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.13 calendar entrance"
            git push
          fi
