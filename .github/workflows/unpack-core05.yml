name: OUTBASE Core05 unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_MVPβ一周確認.zip'
      - '.github/workflows/unpack-core05.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Core05 package
        run: |
          set -e
          ZIP='OUTBASE_MVPB_Core05_MVPβ一周確認.zip'
          BASE='OUTBASE_MVPB_CORE05_FLOW_CHECK'
          if [ ! -f "$ZIP" ]; then
            echo "Zip not found: $ZIP"
            exit 0
          fi
          rm -rf "$BASE"
          unzip -o "$ZIP"
          cp -R "$BASE"/. .
          rm -f "$ZIP"
          rm -rf "$BASE"

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "OUTBASE Core05 MVP beta flow check"
            git push
          fi
