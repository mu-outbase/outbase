name: OUTBASE v140 unpack

on:
  workflow_dispatch:
  push:
    paths:
      - 'OUTBASE_MVP固定版_v140_本開発構成移行セット.zip'
      - '.github/workflows/unpack-v140.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip v140 package
        run: |
          set -e
          ZIP='OUTBASE_MVP固定版_v140_本開発構成移行セット.zip'
          BASE='OUTBASE_MVP_FIXED_DEV_BASE_v140'
          if [ ! -f "$ZIP" ]; then
            echo "ZIP not found: $ZIP"
            exit 1
          fi
          rm -rf _outbase_unpack
          mkdir _outbase_unpack
          unzip -o "$ZIP" -d _outbase_unpack
          cp -R _outbase_unpack/$BASE/. .
          rm -rf _outbase_unpack
          rm -f "$ZIP"

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "OUTBASE v140 MVP fixed dev base"
          git push
