name: OUTBASE ZIP Unpack

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.zip"
      - ".github/workflows/unpack-restart-35.yml"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: |
          ls -la

      - name: Pick latest ZIP
        run: |
          ZIP_FILE=$(ls -t *.zip | head -n 1)
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP_FILE"

      - name: Unpack OUTBASE ZIP
        run: |
          unzip -o "$ZIP_FILE" -d .

      - name: Remove uploaded ZIP files
        run: |
          rm -f *.zip

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Apply OUTBASE ZIP files" || echo "No changes to commit"
          git push
