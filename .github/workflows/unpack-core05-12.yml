name: OUTBASE Core05.12 Calendar Edit Recurring unpack

on:
  push:
    branches:
      - main
    paths:
      - 'OUTBASE_MVPB_Core05_12_CalendarEditRecurring.zip'
      - '.github/workflows/unpack-core05-12.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm zip exists
        run: |
          set -e
          ls -la
          test -f OUTBASE_MVPB_Core05_12_CalendarEditRecurring.zip

      - name: Unzip Core05.12 package
        run: |
          set -e
          rm -rf /tmp/outbase_core05_12
          mkdir -p /tmp/outbase_core05_12
          unzip -o OUTBASE_MVPB_Core05_12_CalendarEditRecurring.zip -d /tmp/outbase_core05_12
          ls -la /tmp/outbase_core05_12
          cp -R /tmp/outbase_core05_12/. ./
          rm -f OUTBASE_MVPB_Core05_12_CalendarEditRecurring.zip

      - name: Commit unpacked files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply OUTBASE Core05.12 calendar edit recurring"
            git push
          fi
