<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A3328">
<title>OUTBASE カレンダー</title>
<link rel="stylesheet" href="calendar-formal-v32.css?v=outbase-calendar-formal-v32-1">
</head>
<body>
<div class="status-strip"></div>
<header class="app-header">
  <a class="formal-brand" href="./?shell=1&view=home" aria-label="ホームへ戻る">
    <span class="formal-brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
    <strong>OUTBASE</strong>
  </a>
  <div class="formal-header-actions">
      <button id="todayBtn" type="button">今日</button>
      <button id="settingsBtn" type="button" aria-label="カレンダー設定">⚙</button>
      <span class="connection-state">接続中</span>
    </div>
</header>

<main class="page">
  <section class="formal-calendar-head">
    <a class="formal-back" href="./?shell=1&view=home" aria-label="ホームへ戻る">‹</a>
    <button id="addEventBtn" class="hero-add" aria-label="予定を追加">＋</button>
    <div class="formal-title">
      <small>CALENDAR</small>
      <h1 id="periodLabel"></h1>
      <p>家族・ペット</p>
    </div>
    <div id="formalPeopleFilters" class="formal-people" aria-label="家族・ペット絞り込み"></div>
  </section>

  <section class="toolbar">
    <div class="view-tabs">
      <button data-view="month" class="active">月</button>
      <button data-view="week">週</button>
      <button data-view="day">日</button>
      <button data-view="list">一覧</button>
      <button data-view="todo">ToDo</button>
    </div>
    <div class="nav-row">
      <div class="period-nav">
        <button id="prevBtn">‹</button>
        <button id="nextBtn">›</button>
      </div>
      <button id="filterBtn">絞り込み</button>
    </div>
  </section>

  <section id="filterPanel" class="panel hidden"></section>
  <section id="calendarArea" aria-live="polite"></section>

  <section id="agendaSection" class="agenda">
    <div class="section-title">
      <div><small>選択日</small><h2 id="selectedLabel"></h2></div>
      <button id="quickAddBtn">＋</button>
    </div>
    <div id="agendaList"></div>
  </section>
</main>

<nav class="bottom-nav">
  <a href="./?shell=1&view=home" target="_top" data-parent-nav="home">⌂<span>ホーム</span></a>
  <button class="active">▣<span>カレンダー</span></button>
  <button id="navAdd">＋<span>追加</span></button>
  <a href="./?shell=1&view=vault" target="_top" data-parent-nav="vault">▤<span>保管庫</span></a>
</nav>

<div id="modal" class="modal hidden">
  <div class="sheet">
    <div class="grab"></div>
    <div class="sheet-head">
      <div><small id="sheetEyebrow"></small><h2 id="sheetTitle"></h2></div>
      <button id="closeModal">×</button>
    </div>
    <div id="sheetBody"></div>
  </div>
</div>

<input id="icsFile" type="file" accept=".ics,text/calendar" hidden>
<input id="csvFile" type="file" accept=".csv,text/csv" hidden>
<input id="jsonFile" type="file" accept=".json,application/json" hidden>
<script src="calendar-formal-v32.js?v=outbase-calendar-formal-v32-1"></script>
</body>
</html>
