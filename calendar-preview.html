<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A3328">
<title>OUTBASE Calendar Preview</title>
<link rel="stylesheet" href="calendar-preview-v23.css?v=20260719-1">
</head>
<body>
<div class="status-strip"></div>
<header class="app-header">
  <div class="brand">OUTBASE</div>
  <div class="header-actions">
    <button id="todayBtn" class="text-btn">今日</button>
    <button id="settingsBtn" class="icon-btn" aria-label="カレンダー設定">⚙</button>
  </div>
</header>

<main class="page">
  <section class="calendar-hero">
    <div>
      <small>CALENDAR</small>
      <h1 id="monthLabel"></h1>
    </div>
    <button id="addBtn" class="hero-add" aria-label="予定を追加">＋</button>
  </section>

  <section class="calendar-toolbar">
    <div class="view-tabs" role="tablist">
      <button data-view="month" class="active">月</button>
      <button data-view="week">週</button>
      <button data-view="day">日</button>
      <button data-view="list">一覧</button>
    </div>
    <div class="nav-row">
      <div class="period-nav">
        <button id="prevBtn" aria-label="前へ">‹</button>
        <button id="nextBtn" aria-label="次へ">›</button>
      </div>
      <button id="filterBtn" class="filter-btn">絞り込み</button>
    </div>
  </section>

  <section id="filterPanel" class="filter-panel hidden"></section>

  <section id="calendarArea" aria-live="polite"></section>

  <section class="agenda">
    <div class="section-title">
      <div>
        <small>選択日</small>
        <h2 id="selectedLabel"></h2>
      </div>
      <button id="quickAddBtn" aria-label="選択日に追加">＋</button>
    </div>
    <div id="agendaList"></div>
  </section>
</main>

<nav class="bottom-nav">
  <a href="./?shell=1&view=home">⌂<span>ホーム</span></a>
  <button class="active">▣<span>カレンダー</span></button>
  <button id="navAdd">＋<span>追加</span></button>
  <a href="./?shell=1&view=vault">▤<span>保管庫</span></a>
</nav>

<div id="modal" class="modal hidden" aria-hidden="true">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grab"></div>
    <div class="sheet-head">
      <div><small id="sheetEyebrow">予定</small><h2 id="sheetTitle">予定を追加</h2></div>
      <button id="closeModal" aria-label="閉じる">×</button>
    </div>
    <div id="sheetBody"></div>
  </div>
</div>

<input id="icsFile" type="file" accept=".ics,text/calendar" hidden>
<script src="calendar-preview-v23.js?v=20260719-1"></script>
</body>
</html>
